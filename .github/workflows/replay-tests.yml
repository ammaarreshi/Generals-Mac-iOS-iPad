name: Replay Tests

# GeneralsX @build BenderAI 07/05/2026 Deterministic headless replay test per platform.
# Downloads the built binary artifact, game assets (encrypted 7z), and platform replay
# files, then runs each replay headlessly and reports pass/fail per file.

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
        description: "Target platform: linux, linux-flatpak or macos"
      game-artifact:
        required: true
        type: string
        description: "Name of the built game artifact to download (from build workflow)"
      run-id:
        required: false
        type: string
        description: "Optional workflow run ID to download artifacts from"
    secrets:
      ASSETS_KEY:
        required: true
        description: "Password for generalszh.7z / generals.7z in the test-files repo"

jobs:
  replay-test-zh:
    name: ZH Replay Tests (${{ inputs.platform }})
    # Defense in depth: callers must not run secret-dependent replay tests for
    # pull-request code, including same-repository pull requests.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ inputs.platform == 'macos' && 'macos-latest' || 'ubuntu-latest' }}
    timeout-minutes: 45

    steps:
      # -----------------------------------------------------------------------
      # 1. Download built binary artifact from upstream build job
      # -----------------------------------------------------------------------
      # GeneralsX @build GitHubCopilot 08/05/2026 Use Node 24 compatible GitHub Actions major versions to remove runner deprecation warnings.
      - name: Download game artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.game-artifact }}
          path: /tmp/game-artifact
          run-id: ${{ inputs.run-id || github.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 2. Platform-specific system dependencies
      # -----------------------------------------------------------------------
      - name: Install system dependencies (Linux)
        if: inputs.platform == 'linux'
        run: |
          sudo apt-get update -qq
          # lavapipe: software Vulkan renderer (no GPU required in CI)
          sudo apt-get install -y -qq p7zip-full mesa-vulkan-drivers libvulkan1

      - name: Cache Flatpak Runtime
        if: inputs.platform == 'linux-flatpak'
        uses: actions/cache@v5
        with:
          path: ~/.local/share/flatpak/runtime
          key: flatpak-runtime-25.08-v1

      - name: Install system dependencies (Linux Flatpak)
        if: inputs.platform == 'linux-flatpak'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq p7zip-full flatpak

          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub org.freedesktop.Platform//25.08

      - name: Install system dependencies (macOS)
        if: inputs.platform == 'macos'
        run: brew install p7zip coreutils

      # -----------------------------------------------------------------------
      # 3. Extract game bundle from artifact
      #    Linux:  GeneralsX-GeneralsMD-deploy/ (binary + .so libs at root)
      #    macOS:  GeneralsXZH.app/Contents/Resources/bin/ + lib/ + MoltenVK_icd.json
      # -----------------------------------------------------------------------
      - name: Extract game bundle (Linux)
        if: inputs.platform == 'linux'
        run: |
          mkdir -p /tmp/game-bundle
          TAR_FILE=$(find /tmp/game-artifact -name "*.tar" | head -1)
          echo "Extracting: $TAR_FILE"
          tar -xf "$TAR_FILE" -C /tmp/game-bundle

          # Locate the binary to identify the game dir
          GAME_BIN=$(find /tmp/game-bundle -name "GeneralsXZH" -type f | head -1)
          GAME_DIR=$(dirname "$GAME_BIN")
          echo "GAME_DIR=$GAME_DIR" >> $GITHUB_ENV
          echo "GAME_BIN=$GAME_BIN" >> $GITHUB_ENV

          echo "Game bundle contents:"
          ls -la "$GAME_DIR/"

      - name: Extract game bundle (macOS)
        if: inputs.platform == 'macos'
        run: |
          mkdir -p /tmp/game-bundle
          TAR_FILE=$(find /tmp/game-artifact -name "*.tar" | head -1)
          echo "Extracting: $TAR_FILE"
          tar -xf "$TAR_FILE" -C /tmp/game-bundle

          # Resolve app layout directly to avoid path inference mistakes.
          APP_DIR=$(find /tmp/game-bundle -type d -name "*.app" | head -1)
          if [ -z "$APP_DIR" ]; then
            echo "ERROR: .app bundle not found after extraction"
            find /tmp/game-bundle -maxdepth 4 -print
            exit 1
          fi

          APP_RESOURCES="$APP_DIR/Contents/Resources"
          GAME_DIR="$APP_RESOURCES/bin"
          GAME_BIN="$GAME_DIR/GeneralsXZH"

          if [ ! -d "$APP_RESOURCES" ]; then
            echo "ERROR: Resources dir not found: $APP_RESOURCES"
            find "$APP_DIR" -maxdepth 4 -print
            exit 1
          fi

          if [ ! -f "$GAME_BIN" ]; then
            echo "ERROR: Game binary not found at expected path: $GAME_BIN"
            find "$APP_RESOURCES" -maxdepth 4 -type f -name "GeneralsXZH" -print
            exit 1
          fi

          echo "GAME_BIN=$GAME_BIN" >> $GITHUB_ENV
          echo "GAME_DIR=$GAME_DIR" >> $GITHUB_ENV
          echo "APP_RESOURCES=$APP_RESOURCES" >> $GITHUB_ENV

          echo "Game bundle contents (Resources):"
          ls -la "$APP_RESOURCES/"

      - name: Install game bundle (Linux Flatpak)
        if: inputs.platform == 'linux-flatpak'
        run: |
          FLATPAK_FILE=$(find /tmp/game-artifact -name "*.flatpak" -type f | head -1)
          if [ -z "$FLATPAK_FILE" ] || [ ! -f "$FLATPAK_FILE" ]; then
            echo "ERROR: Flatpak bundle not found in downloaded artifact"
            find /tmp/game-artifact -maxdepth 5 -type f -print || true
            exit 1
          fi

          echo "Installing Flatpak bundle: $FLATPAK_FILE"
          flatpak --user install -y "$FLATPAK_FILE"
          flatpak --user info com.fbraz3.GeneralsXZH

      # -----------------------------------------------------------------------
      # 4. Resolve, cache and decrypt retail assets
      #
      # Only the encrypted LFS object is cached. The cache key contains the
      # immutable LFS SHA-256, so changed assets cannot restore a stale entry.
      # Plaintext exists only in this trusted, ephemeral runner job.
      # GeneralsX @build Codex 10/07/2026 Prevent plaintext retail assets from entering shared Actions caches.
      # -----------------------------------------------------------------------
      - name: Resolve encrypted game assets revision
        id: assets-source
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${TARGET_BRANCH:-}" ]; then
            TARGET_BRANCH="main"
          fi

          ASSETS_REPO_URL=""
          ASSETS_REV=""
          ASSETS_BRANCH=""

          for candidate_url in \
            "https://gitlab.com/fbraz3/generalsx-test-files.git" \
            "https://github.com/fbraz3/generalsx-test-files.git"; do
            candidate_branch="$TARGET_BRANCH"
            candidate_rev="$(git ls-remote --heads "$candidate_url" "refs/heads/$candidate_branch" 2>/dev/null | awk 'NR == 1 { print $1 }' || true)"

            if [ -z "$candidate_rev" ]; then
              default_ref="$(git ls-remote --symref "$candidate_url" HEAD 2>/dev/null || true)"
              candidate_branch="$(printf '%s\n' "$default_ref" | awk '$1 == "ref:" && $3 == "HEAD" { sub("refs/heads/", "", $2); print $2; exit }')"
              candidate_rev="$(printf '%s\n' "$default_ref" | awk '$2 == "HEAD" && $1 != "ref:" { print $1; exit }')"
            fi

            if [ -n "$candidate_rev" ]; then
              ASSETS_REPO_URL="$candidate_url"
              ASSETS_REV="$candidate_rev"
              ASSETS_BRANCH="$candidate_branch"
              break
            fi
          done

          if [ -z "$ASSETS_REPO_URL" ] || [ -z "$ASSETS_REV" ]; then
            echo "ERROR: Unable to resolve encrypted assets from either mirror"
            exit 1
          fi

          rm -rf "$GITHUB_WORKSPACE/ci-assets-repo"
          git init -q "$GITHUB_WORKSPACE/ci-assets-repo"
          git -C "$GITHUB_WORKSPACE/ci-assets-repo" remote add origin "$ASSETS_REPO_URL"
          GIT_LFS_SKIP_SMUDGE=1 git -C "$GITHUB_WORKSPACE/ci-assets-repo" fetch --depth=1 origin "$ASSETS_REV"
          GIT_LFS_SKIP_SMUDGE=1 git -C "$GITHUB_WORKSPACE/ci-assets-repo" checkout --detach FETCH_HEAD

          ASSETS_OID="$(git -C "$GITHUB_WORKSPACE/ci-assets-repo" show HEAD:generalszh.7z | sed -n 's/^oid sha256://p')"
          if [ "${#ASSETS_OID}" -ne 64 ]; then
            echo "ERROR: generalszh.7z is not an expected SHA-256 Git LFS pointer"
            exit 1
          fi
          case "$ASSETS_OID" in
            *[!0-9a-f]*)
              echo "ERROR: generalszh.7z contains an invalid Git LFS object ID"
              exit 1
              ;;
          esac

          echo "repo-url=$ASSETS_REPO_URL" >> "$GITHUB_OUTPUT"
          echo "revision=$ASSETS_REV" >> "$GITHUB_OUTPUT"
          echo "lfs-oid=$ASSETS_OID" >> "$GITHUB_OUTPUT"
          echo "Resolved encrypted assets branch $ASSETS_BRANCH at $ASSETS_REV (LFS SHA-256 $ASSETS_OID)"

      - name: Cache encrypted game assets
        id: cache-encrypted-assets
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/generalsx-encrypted-assets/generalszh.7z
          key: generalsx-encrypted-assets-v1-${{ runner.os }}-${{ steps.assets-source.outputs.lfs-oid }}

      - name: Download encrypted game assets
        if: steps.cache-encrypted-assets.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_DIR="$GITHUB_WORKSPACE/ci-assets-repo"
          ENCRYPTED_DIR="$RUNNER_TEMP/generalsx-encrypted-assets"
          mkdir -p "$ENCRYPTED_DIR"
          git -C "$SOURCE_DIR" lfs install --local

          if ! git -C "$SOURCE_DIR" lfs pull origin --include="generalszh.7z"; then
            echo "Primary LFS endpoint failed; retrying the GitHub mirror"
            git -C "$SOURCE_DIR" remote set-url origin "https://github.com/fbraz3/generalsx-test-files.git"
            git -C "$SOURCE_DIR" lfs pull origin --include="generalszh.7z"
          fi

          cp "$SOURCE_DIR/generalszh.7z" "$ENCRYPTED_DIR/generalszh.7z"

      - name: Verify encrypted game assets
        shell: bash
        run: |
          set -euo pipefail

          ENCRYPTED_ARCHIVE="$RUNNER_TEMP/generalsx-encrypted-assets/generalszh.7z"
          EXPECTED_SHA256="${{ steps.assets-source.outputs.lfs-oid }}"
          if [ ! -f "$ENCRYPTED_ARCHIVE" ]; then
            echo "ERROR: Encrypted asset archive is missing"
            exit 1
          fi

          ACTUAL_SHA256="$(shasum -a 256 "$ENCRYPTED_ARCHIVE" | awk '{ print $1 }')"
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "ERROR: Encrypted asset archive SHA-256 mismatch"
            exit 1
          fi

      - name: Decrypt game assets for replay job
        shell: bash
        env:
          ASSETS_KEY: ${{ secrets.ASSETS_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$ASSETS_KEY" ]; then
            echo "ERROR: ASSETS_KEY is required for trusted replay jobs"
            exit 1
          fi

          ENCRYPTED_ARCHIVE="$RUNNER_TEMP/generalsx-encrypted-assets/generalszh.7z"
          ASSETS_DIR="$RUNNER_TEMP/generalsx-decrypted-assets"
          rm -rf "$ASSETS_DIR"
          mkdir -p "$ASSETS_DIR"
          7z x "-p$ASSETS_KEY" "$ENCRYPTED_ARCHIVE" "-o$ASSETS_DIR" -y >/dev/null

          if ! find "$ASSETS_DIR" -type f -name '*.big' -print -quit | grep -q .; then
            echo "ERROR: Decrypted retail asset set contains no .big files"
            exit 1
          fi

          echo "ASSETS_DIR=$ASSETS_DIR" >> "$GITHUB_ENV"

      - name: Install game assets (Linux)
        if: inputs.platform == 'linux'
        run: |
          echo "Copying decrypted game assets into: $GAME_DIR"
          cp -r "$ASSETS_DIR/." "$GAME_DIR/"
          echo "Big files found:"
          ls "$GAME_DIR/"*.big 2>/dev/null | head -10 || echo "(none found)"

      - name: Install game assets (macOS)
        if: inputs.platform == 'macos'
        run: |
          echo "Copying decrypted game assets into: $GAME_DIR"
          cp -r "$ASSETS_DIR/." "$GAME_DIR/"
          echo "Big files found:"
          ls "$GAME_DIR/"*.big 2>/dev/null | head -10 || echo "(none found)"

      # -----------------------------------------------------------------------
      # 5. Check out replay repo and install maps + platform-specific replays
      #    Repo structure: GeneralsXZH/Maps/<MapFolder>/  GeneralsXZH/Replays/<platform>_*.rep
      # -----------------------------------------------------------------------
      - name: Clone replay files at immutable revision
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${TARGET_BRANCH:-}" ]; then
            TARGET_BRANCH="main"
          fi

          REPLAYS_REPO_URL=""
          REPLAYS_REV=""
          REPLAYS_BRANCH=""

          for candidate_url in \
            "https://gitlab.com/fbraz3/generalsx-replays.git" \
            "https://github.com/fbraz3/GeneralsXReplays.git"; do
            candidate_branch="$TARGET_BRANCH"
            candidate_rev="$(git ls-remote --heads "$candidate_url" "refs/heads/$candidate_branch" 2>/dev/null | awk 'NR == 1 { print $1 }' || true)"

            if [ -z "$candidate_rev" ]; then
              default_ref="$(git ls-remote --symref "$candidate_url" HEAD 2>/dev/null || true)"
              candidate_branch="$(printf '%s\n' "$default_ref" | awk '$1 == "ref:" && $3 == "HEAD" { sub("refs/heads/", "", $2); print $2; exit }')"
              candidate_rev="$(printf '%s\n' "$default_ref" | awk '$2 == "HEAD" && $1 != "ref:" { print $1; exit }')"
            fi

            if [ -n "$candidate_rev" ]; then
              REPLAYS_REPO_URL="$candidate_url"
              REPLAYS_REV="$candidate_rev"
              REPLAYS_BRANCH="$candidate_branch"
              break
            fi
          done

          if [ -z "$REPLAYS_REPO_URL" ] || [ -z "$REPLAYS_REV" ]; then
            echo "ERROR: Unable to resolve replay files from either mirror"
            exit 1
          fi

          rm -rf "$GITHUB_WORKSPACE/ci-replays-repo"
          git init -q "$GITHUB_WORKSPACE/ci-replays-repo"
          git -C "$GITHUB_WORKSPACE/ci-replays-repo" remote add origin "$REPLAYS_REPO_URL"
          git -C "$GITHUB_WORKSPACE/ci-replays-repo" fetch --depth=1 origin "$REPLAYS_REV"
          git -C "$GITHUB_WORKSPACE/ci-replays-repo" checkout --detach FETCH_HEAD
          echo "Resolved replay branch $REPLAYS_BRANCH at $REPLAYS_REV"

      - name: Set up user data directories (Linux)
        if: inputs.platform == 'linux' || inputs.platform == 'linux-flatpak'
        env:
          INPUT_PLATFORM: ${{ inputs.platform }}
        run: |
          USER_DATA="$HOME/.local/share/GeneralsX/GeneralsZH"
          MAPS_DIR="$USER_DATA/Maps"
          REPLAYS_DIR="$USER_DATA/Replays"
          mkdir -p "$MAPS_DIR" "$REPLAYS_DIR"

          # Install custom maps (includes MapCache.ini)
          if [ -d "$GITHUB_WORKSPACE/ci-replays-repo/GeneralsXZH/Maps" ]; then
            cp -r "$GITHUB_WORKSPACE/ci-replays-repo/GeneralsXZH/Maps/." "$MAPS_DIR/"
            echo "Maps installed:"
            ls -la "$MAPS_DIR/"
          fi

          # GeneralsX @bugfix Codex 10/07/2026 Map Flatpak to the Linux replay corpus and reject an empty platform selection.
          case "$INPUT_PLATFORM" in
            linux|linux-flatpak) REPLAY_PLATFORM="linux" ;;
            *)
              echo "::error::Unsupported Linux replay platform: $INPUT_PLATFORM"
              exit 1
              ;;
          esac

          shopt -s nullglob
          REPLAY_FILES=("$GITHUB_WORKSPACE/ci-replays-repo/GeneralsXZH/Replays/${REPLAY_PLATFORM}_"*.rep)
          REPLAY_COUNT=${#REPLAY_FILES[@]}
          if [ "$REPLAY_COUNT" -eq 0 ]; then
            echo "::error::No ${REPLAY_PLATFORM}_*.rep files found in replay repo"
            exit 1
          fi
          rm -f "$REPLAYS_DIR"/*.rep
          cp "${REPLAY_FILES[@]}" "$REPLAYS_DIR/"
          echo "Replays installed ($REPLAY_COUNT files):"
          ls -la "$REPLAYS_DIR/"

          echo "USER_DATA=$USER_DATA" >> $GITHUB_ENV

      - name: Install game assets (Linux Flatpak)
        if: inputs.platform == 'linux-flatpak'
        run: |
          echo "Copying decrypted game assets into: $USER_DATA"
          cp -r "$ASSETS_DIR/." "$USER_DATA/"
          echo "Big files found:"
          ls "$USER_DATA/"*.big 2>/dev/null | head -10 || echo "(none found)"

      - name: Set up user data directories (macOS)
        if: inputs.platform == 'macos'
        run: |
          USER_DATA="$HOME/Library/Application Support/GeneralsX/GeneralsZH"
          MAPS_DIR="$USER_DATA/Maps"
          REPLAYS_DIR="$USER_DATA/Replays"
          mkdir -p "$MAPS_DIR" "$REPLAYS_DIR"

          # Install custom maps (includes MapCache.ini)
          if [ -d "$GITHUB_WORKSPACE/ci-replays-repo/GeneralsXZH/Maps" ]; then
            cp -r "$GITHUB_WORKSPACE/ci-replays-repo/GeneralsXZH/Maps/." "$MAPS_DIR/"
            echo "Maps installed:"
            ls -la "$MAPS_DIR/"
          fi

          # GeneralsX @bugfix Codex 10/07/2026 Run macOS only against replays recorded for its CRT behavior.
          shopt -s nullglob
          REPLAY_FILES=("$GITHUB_WORKSPACE/ci-replays-repo/GeneralsXZH/Replays/macos_"*.rep)
          REPLAY_COUNT=${#REPLAY_FILES[@]}
          if [ "$REPLAY_COUNT" -eq 0 ]; then
            echo "::error::No macos_*.rep files found in replay repo"
            exit 1
          fi
          rm -f "$REPLAYS_DIR"/*.rep
          cp "${REPLAY_FILES[@]}" "$REPLAYS_DIR/"
          echo "Replays installed ($REPLAY_COUNT files):"
          ls -la "$REPLAYS_DIR/"

          # Store path without spaces in GITHUB_ENV using heredoc syntax
          {
            echo "USER_DATA<<GHENV_EOF"
            echo "$USER_DATA"
            echo "GHENV_EOF"
          } >> $GITHUB_ENV

      # -----------------------------------------------------------------------
      # 6. Run headless replay tests
      # -----------------------------------------------------------------------
      - name: Run headless replay tests (Linux)
        if: inputs.platform == 'linux'
        run: |
          PASS=0
          FAIL=0

          cd "$GAME_DIR"

          export LD_LIBRARY_PATH="$GAME_DIR:${LD_LIBRARY_PATH:-}"
          export DXVK_WSI_DRIVER=SDL3
          export DXVK_LOG_LEVEL=none
          # GeneralsX @bugfix GitHubCopilot 17/05/2026 Force SDL dummy drivers for Linux headless replay CI on runners without display/audio devices.
          export SDL_VIDEODRIVER=dummy
          export SDL_AUDIODRIVER=dummy
          # Force lavapipe (CPU Vulkan) - no GPU available on GitHub runners
          export VK_ICD_FILENAMES=/usr/share/vulkan/icd.d/lvp_icd.x86_64.json

          # GeneralsX @bugfix GitHubCopilot 17/05/2026 Restore deterministic replay report table with per-file pass/fail status on Linux CI.
          echo "### Replay Test Results (linux)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Replay | Result | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          for rep in "$USER_DATA/Replays"/*.rep; do
            [ -f "$rep" ] || continue
            NAME=$(basename "$rep")
            echo "=== $NAME ==="

            set +e
            OUTPUT=$(timeout 180 ./GeneralsXZH -headless -replay "$rep" 2>&1)
            CODE=$?
            set -e

            #echo "$OUTPUT" | grep -iE "\[GeneralsX\]|Simulating|Elapsed|CRC|MISMATCH|returned with code|Cannot open replay|FATAL" || true
            echo "$OUTPUT"

            if [ $CODE -eq 0 ]; then
              PASS=$((PASS + 1))
              echo "PASS"
              echo "| \`$NAME\` | PASS | exit 0 |" >> $GITHUB_STEP_SUMMARY
            else
              FAIL=$((FAIL + 1))
              DETAIL=$(echo "$OUTPUT" | grep -iE "Error|CRC|MISMATCH|Exiting|FATAL|returned with code|Cannot open replay|FATAL" | tail -3 | tr '\n' ' ' | tr '|' '/')
              [ -n "$DETAIL" ] || DETAIL="no filtered diagnostics"
              echo "FAIL (exit $CODE)"
              echo "| \`$NAME\` | FAIL | exit $CODE: $DETAIL |" >> $GITHUB_STEP_SUMMARY
            fi

            echo ""
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Results: $PASS passed, $FAIL failed**" >> $GITHUB_STEP_SUMMARY

          if [ $FAIL -gt 0 ]; then
            echo "::error::$FAIL replay(s) failed on linux"
            exit 1
          fi
          if [ $((PASS + FAIL)) -eq 0 ]; then
            echo "::error::No Linux replay files were found to test"
            exit 1
          fi

      - name: Run headless replay tests (Linux Flatpak)
        if: inputs.platform == 'linux-flatpak'
        run: |
          PASS=0
          FAIL=0

          export DXVK_LOG_LEVEL=none
          export SDL_VIDEODRIVER=dummy
          export SDL_AUDIODRIVER=dummy

          # GeneralsX @bugfix GitHubCopilot 18/05/2026 Run deterministic Linux replay CI using Flatpak runtime instead of gzip bundle.
          echo "### Replay Test Results (linux-flatpak)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Replay | Result | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          for rep in "$USER_DATA/Replays"/*.rep; do
            [ -f "$rep" ] || continue
            NAME=$(basename "$rep")
            echo "=== $NAME ==="

            set +e
            OUTPUT=$(timeout 180 flatpak run --env=SDL_VIDEODRIVER=dummy --env=SDL_AUDIODRIVER=dummy --env=DXVK_LOG_LEVEL=none com.fbraz3.GeneralsXZH -headless -replay "$rep" 2>&1)
            CODE=$?
            set -e

            #echo "$OUTPUT" | grep -iE "\[GeneralsX\]|Simulating|Elapsed|CRC|MISMATCH|returned with code|Cannot open replay|FATAL" || true
            echo "$OUTPUT"

            if [ $CODE -eq 0 ]; then
              PASS=$((PASS + 1))
              echo "PASS"
              echo "| \`$NAME\` | PASS | exit 0 |" >> $GITHUB_STEP_SUMMARY
            else
              FAIL=$((FAIL + 1))
              DETAIL=$(echo "$OUTPUT" | grep -iE "Error|CRC|MISMATCH|Exiting|FATAL|returned with code|Cannot open replay|FATAL" | tail -3 | tr '\n' ' ' | tr '|' '/')
              [ -n "$DETAIL" ] || DETAIL="no filtered diagnostics"
              echo "FAIL (exit $CODE)"
              echo "| \`$NAME\` | FAIL | exit $CODE: $DETAIL |" >> $GITHUB_STEP_SUMMARY
            fi

            echo ""
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Results: $PASS passed, $FAIL failed**" >> $GITHUB_STEP_SUMMARY

          if [ $FAIL -gt 0 ]; then
            echo "::error::$FAIL replay(s) failed on linux-flatpak"
            exit 1
          fi
          if [ $((PASS + FAIL)) -eq 0 ]; then
            echo "::error::No Linux Flatpak replay files were found to test"
            exit 1
          fi

      - name: Run headless replay tests (macOS)
        if: inputs.platform == 'macos'
        run: |
          PASS=0
          FAIL=0
          TIMEOUT_BIN="gtimeout"

          cd "$GAME_DIR"

          export DYLD_LIBRARY_PATH="$APP_RESOURCES/lib:${DYLD_LIBRARY_PATH:-}"
          export DYLD_FALLBACK_LIBRARY_PATH="$APP_RESOURCES/lib:${DYLD_FALLBACK_LIBRARY_PATH:-}"
          export DXVK_WSI_DRIVER=SDL3
          export DXVK_LOG_LEVEL=none
          # Point the game to the extracted assets dir (bin/ alongside the binary)
          export CNC_GENERALS_ZH_PATH="$GAME_DIR"
          # Use MoltenVK bundled inside the .app
          if [ -f "$APP_RESOURCES/MoltenVK_icd.json" ]; then
            export VK_ICD_FILENAMES="$APP_RESOURCES/MoltenVK_icd.json"
            export VK_DRIVER_FILES="$APP_RESOURCES/MoltenVK_icd.json"
          fi
          if [ -f "$APP_RESOURCES/dxvk.conf" ]; then
            export DXVK_CONFIG_FILE="$APP_RESOURCES/dxvk.conf"
          fi

          # GeneralsX @bugfix GitHubCopilot 17/05/2026 Restore deterministic replay report table with per-file pass/fail status on macOS CI.
          echo "### Replay Test Results (macos)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Replay | Result | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|---------|" >> $GITHUB_STEP_SUMMARY

          for rep in "$USER_DATA/Replays"/*.rep; do
            [ -f "$rep" ] || continue
            NAME=$(basename "$rep")
            echo "=== $NAME ==="

            set +e
            OUTPUT=$($TIMEOUT_BIN 180 ./GeneralsXZH -headless -replay "$rep" 2>&1)
            CODE=$?
            set -e

            #echo "$OUTPUT" | grep -iE "\[GeneralsX\]|Simulating|Elapsed|CRC|MISMATCH|returned with code|Cannot open replay|FATAL" || true
            echo "$OUTPUT"

            if [ $CODE -eq 0 ]; then
              PASS=$((PASS + 1))
              echo "PASS"
              echo "| \`$NAME\` | PASS | exit 0 |" >> $GITHUB_STEP_SUMMARY
            else
              FAIL=$((FAIL + 1))
              DETAIL=$(echo "$OUTPUT" | grep -iE "Error|CRC|MISMATCH|Exiting|FATAL|returned with code|Cannot open replay|FATAL" | tail -3 | tr '\n' ' ' | tr '|' '/')
              [ -n "$DETAIL" ] || DETAIL="no filtered diagnostics"
              echo "FAIL (exit $CODE)"
              echo "| \`$NAME\` | FAIL | exit $CODE: $DETAIL |" >> $GITHUB_STEP_SUMMARY
            fi

            echo ""
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Results: $PASS passed, $FAIL failed**" >> $GITHUB_STEP_SUMMARY

          if [ $FAIL -gt 0 ]; then
            echo "::error::$FAIL replay(s) failed on macos"
            exit 1
          fi
          if [ $((PASS + FAIL)) -eq 0 ]; then
            echo "::error::No macOS replay files were found to test"
            exit 1
          fi

      - name: Remove decrypted retail assets
        if: always()
        shell: bash
        run: |
          rm -rf "$RUNNER_TEMP/generalsx-decrypted-assets"
